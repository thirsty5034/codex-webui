name: Build & Push Docker Image to GHCR

on:
  push:
    tags:
      - 'codex-*'
  workflow_dispatch:
    inputs:
      tag_override:
        description: 'Override image tag (e.g. codex-0.120.0-rc1). Leave empty to use dev-<sha>'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-arch:
    strategy:
      max-parallel: 2
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-22.04-arm

    runs-on: ${{ matrix.runner }}

    permissions:
      contents: read
      packages: write

    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}
      codex_version: ${{ steps.meta.outputs.codex_version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata from tag
        id: meta
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "image_name=${IMAGE_NAME_LOWER}" >> $GITHUB_OUTPUT

          if [[ "${{ github.event_name }}" == "push" && "${{ github.ref_type }}" == "tag" ]]; then
            # Tag push: codex-0.120.0 or codex-0.120.0-2
            TAG="${{ github.ref_name }}"
            echo "version_tag=${TAG}" >> $GITHUB_OUTPUT
            # Extract semver for CODEX_CLI_VERSION: codex-0.120.0(-2)? → 0.120.0
            CODEX_VERSION=$(echo "$TAG" | sed -E 's/^codex-([0-9]+\.[0-9]+\.[0-9]+)(-[0-9]+)?$/\1/')
            echo "codex_version=${CODEX_VERSION}" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.tag_override }}" ]]; then
            echo "version_tag=${{ inputs.tag_override }}" >> $GITHUB_OUTPUT
            CODEX_VERSION=$(echo "${{ inputs.tag_override }}" | sed -E 's/^codex-([0-9]+\.[0-9]+\.[0-9]+).*$/\1/')
            echo "codex_version=${CODEX_VERSION}" >> $GITHUB_OUTPUT
          else
            SHORT_SHA=$(git rev-parse --short HEAD)
            echo "version_tag=dev-${SHORT_SHA}" >> $GITHUB_OUTPUT
            # Use default from Dockerfile
            echo "codex_version=" >> $GITHUB_OUTPUT
          fi

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/${{ matrix.arch }}
          build-args: |
            CODEX_CLI_VERSION=${{ steps.meta.outputs.codex_version || '0.123.0' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.meta.outputs.image_name }}:${{ matrix.arch }}-${{ steps.meta.outputs.version_tag }}
          push: true
          provenance: false
          sbom: false
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}

  merge-manifest:
    needs: build-and-push-arch
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest lists
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          IMAGE_BASE="${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}"
          VERSION_TAG="${{ needs.build-and-push-arch.outputs.version_tag }}"

          LATEST_TAG="${IMAGE_BASE}:latest"
          VERSION_IMAGE="${IMAGE_BASE}:${VERSION_TAG}"
          AMD64_IMAGE="${IMAGE_BASE}:amd64-${VERSION_TAG}"
          ARM64_IMAGE="${IMAGE_BASE}:arm64-${VERSION_TAG}"

          echo "Checking architecture images..."
          docker manifest inspect ${AMD64_IMAGE} || { echo "::error::amd64 image not found"; exit 1; }
          docker manifest inspect ${ARM64_IMAGE} || { echo "::error::arm64 image not found"; exit 1; }

          echo "Creating version manifest: ${VERSION_IMAGE}"
          docker manifest create ${VERSION_IMAGE} \
            --amend ${AMD64_IMAGE} \
            --amend ${ARM64_IMAGE}
          docker manifest push ${VERSION_IMAGE}

          echo "Creating latest manifest: ${LATEST_TAG}"
          docker manifest create ${LATEST_TAG} \
            --amend ${AMD64_IMAGE} \
            --amend ${ARM64_IMAGE}
          docker manifest push ${LATEST_TAG}

          echo "Manifests pushed successfully"

      - name: Inspect final manifests
        run: |
          IMAGE_NAME_LOWER=$(echo "${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          echo "--- Version Manifest ---"
          docker manifest inspect ${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:${{ needs.build-and-push-arch.outputs.version_tag }}
          echo ""
          echo "--- Latest Manifest ---"
          docker manifest inspect ${{ env.REGISTRY }}/${IMAGE_NAME_LOWER}:latest
